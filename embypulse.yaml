version: '3.8'

services:
  emby-pulse:
    image: zeyu8023/embypulse-pro:1.3.69
    container_name: emby-manager
    restart: unless-stopped
    networks:
      - net-bridge
    ports:
      - ${webport1}:10307
      - ${webport2}:10308
    
    volumes:
      - /root/emby-pulse/config:/workspace/config
      - /root/emby-pulse/data:/workspace/data
    
    environment:
      - TZ=Asia/Shanghai      
      
      # Emby 配置（本地账号和 Emby Host 必填其一）
      - EMBY_HOST=${embyurl}
      - EMBY_API_KEY=${api}
      
      # - FORCE_MIGRATE=1
networks:
  net-bridge:
    external: true
